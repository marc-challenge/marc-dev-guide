# Read the Docs build config — MARC 2026 Developer Guide (Korean translation)
#
# RTD requires the config filename to be exactly `.readthedocs.yaml`, but allows it
# to live in a subdirectory (monorepo feature). So the Korean build config lives here
# in docs_ko/ rather than as a renamed file at the repo root.
#
# On the Korean RTD project: Admin -> Settings -> "Build configuration file"
# (Path for .readthedocs.yaml) = docs_ko/.readthedocs.yaml. Then link this project
# as a Translation of the English project (marc-challenge).
#
# IMPORTANT: all paths below are relative to the REPOSITORY ROOT, regardless of this
# file living in docs_ko/.
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"

python:
  install:
    - requirements: requirements.txt

sphinx:
  configuration: docs_ko/conf.py
  fail_on_warning: false
  builder: html
