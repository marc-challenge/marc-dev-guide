# Read the Docs build config — MARC 2026 Developer Guide (English, primary)
# ubuntu-22.04 / python 3.10. RTD slug: marc-challenge.
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"

python:
  install:
    - requirements: requirements.txt

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false
  builder: html

# Bilingual setup (RESOLVED — per-language projects via RTD Translations):
#   - English (primary) = this file -> docs/conf.py.
#   - Korean = docs_ko/.readthedocs.yaml -> docs_ko/conf.py, built by a SEPARATE RTD
#     project linked as a Translation of the English project (gives the EN/KO
#     language toggle). Both projects use the same repo/branch.
# RTD forces the config filename to be .readthedocs.yaml, so the Korean config lives
# in the docs_ko/ subdirectory (set the Korean project's "Build configuration file"
# to docs_ko/.readthedocs.yaml). The only out-of-repo step is creating + linking the
# Korean project on the RTD dashboard; both config files live in this repo.

# formats:
#   - pdf
#   - epub
