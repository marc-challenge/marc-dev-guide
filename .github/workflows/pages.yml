name: Deploy developer guide to GitHub Pages

# Builds the bilingual Sphinx guide (English -> /en, Korean -> /ko) and publishes
# it as a static GitHub Pages site at https://marc-challenge.github.io/marc-dev-guide/.
# Replaces the former Read the Docs build.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build English and Korean
        run: |
          python -m sphinx -b html docs    _site/en
          python -m sphinx -b html docs_ko _site/ko

      - name: Root language redirect and disable Jekyll
        run: |
          cp pages_index.html _site/index.html
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
